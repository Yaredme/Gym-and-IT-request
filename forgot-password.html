<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background: linear-gradient(rgba(15,23,42,.85),rgba(15,23,42,.95)),
    url('https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=1920&auto=format&fit=crop')
    no-repeat center center fixed;
    background-size: cover;
}
</style>
</head>

<body class="text-slate-100 min-h-screen flex flex-col justify-between">

<header class="w-full bg-white/10 backdrop-blur-md border-b border-white/10 px-6 py-4">
    <h1 class="text-3xl font-bold text-amber-400">
        Elgel HOTEL AND SPA
    </h1>
</header>

<main class="flex-grow flex items-center justify-center px-4">

<div class="w-full max-w-md bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-8">

    <div class="text-center mb-6">
        <h2 class="text-2xl font-bold">
            Forgot Password
        </h2>
    </div>

 <form action="change-password.html" class="space-y-5">

    <!-- Email Input + Send OTP Button -->
    <div class="relative">

        <input type="email"
               id="email"
               placeholder="Email Address"
               required
               class="w-full bg-slate-900/40 border border-white/10 rounded-xl py-3 pl-4 pr-32">

        <!-- Send OTP Button -->
        <button type="button"
                id="sendOtpBtn"
                onclick="sendOTP()"
                class="absolute right-2 top-1/2 -translate-y-1/2 bg-amber-500 hover:bg-amber-600 text-slate-900 text-xs font-bold px-3 py-2 rounded-lg">
            Send OTP
        </button>

    </div>

    <!-- OTP Success Message -->
    <div id="otpMessage"
         class="hidden bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-sm rounded-lg p-3">
        OTP sent successfully.
    </div>

    <!-- Countdown -->
    <div id="countdown"
         class="hidden text-center text-amber-400 text-sm font-semibold">
        30 seconds remaining
    </div>

    <!-- OTP Input -->
    <input type="text"
           id="otpInput"
           placeholder="Enter OTP Code"
           required
           class="hidden w-full bg-slate-900/40 border border-white/10 rounded-xl py-3 px-4">

    <!-- Verify Button -->
    <button type="submit"
            id="verifyBtn"
            class="hidden w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-3 rounded-xl">
        Verify OTP
    </button>

</form>

</div>

</main>

<footer class="bg-slate-950/40 border-t border-white/5 py-6 text-center text-sm text-slate-400">
    <p>© 2026 Elgel Hotel and Spa</p>
</footer>
<script>

function sendOTP(){

    const email = document.getElementById("email").value;
    const otpMessage = document.getElementById("otpMessage");
    const countdown = document.getElementById("countdown");
    const sendOtpBtn = document.getElementById("sendOtpBtn");
    const verifyBtn = document.getElementById("verifyBtn");
    const otpInput = document.getElementById("otpInput");

    if(email === ""){
        alert("Please enter your email address.");
        return;
    }

    // Show success message
    otpMessage.classList.remove("hidden");

    // Disable button
    sendOtpBtn.disabled = true;

    let seconds = 30;

    countdown.classList.remove("hidden");
    countdown.innerText = seconds + " seconds remaining";

    const timer = setInterval(() => {

        seconds--;

        countdown.innerText = seconds + " seconds remaining";

        if(seconds <= 0){

            clearInterval(timer);

            countdown.innerText = "OTP expired";

            // Show Verify Button
            verifyBtn.classList.remove("hidden");

            // Show OTP Input
            otpInput.classList.remove("hidden");

            // Enable resend button
            sendOtpBtn.disabled = false;
            sendOtpBtn.innerText = "Resend OTP";
        }

    }, 1000);
}

</script>
</body>
</html>
