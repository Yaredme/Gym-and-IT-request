<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Change Password</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background: linear-gradient(rgba(15,23,42,.85),rgba(15,23,42,.95)),
    url('https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=1920&auto=format&fit=crop')
    no-repeat center center fixed;
    background-size: cover;
}
</style>
</head>

<body class="text-slate-100 min-h-screen flex flex-col justify-between">

<header class="w-full bg-white/10 backdrop-blur-md border-b border-white/10 px-6 py-4">
    <h1 class="text-3xl font-bold text-amber-400">
        Elgel HOTEL AND SPA
    </h1>
</header>

<main class="flex-grow flex items-center justify-center px-4">

<div class="w-full max-w-md bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-8">

    <div class="text-center mb-6">
        <h2 class="text-2xl font-bold">
            Change Password
        </h2>
    </div>

    <form onsubmit="savePassword(event)" class="space-y-5">

        <input type="password"
               id="newPassword"
               placeholder="New Password"
               required
               class="w-full bg-slate-900/40 border border-white/10 rounded-xl py-3 px-4">

        <input type="password"
               id="confirmPassword"
               placeholder="Confirm Password"
               required
               class="w-full bg-slate-900/40 border border-white/10 rounded-xl py-3 px-4">

        <button type="submit"
                class="w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-3 rounded-xl">
            Save Changes
        </button>

    </form>

</div>

</main>

<footer class="bg-slate-950/40 border-t border-white/5 py-6 text-center text-sm text-slate-400">
    <p>© 2026 Elgel Hotel and Spa</p>
</footer>

<script>
function savePassword(event){
    event.preventDefault();

    const newPassword =
        document.getElementById("newPassword").value;

    const confirmPassword =
        document.getElementById("confirmPassword").value;

    if(newPassword !== confirmPassword){
        alert("Passwords do not match");
        return;
    }

    alert("Password Changed Successfully");

    window.location.href = "LOGIN.html";
}
</script>

</body>
</html>
